<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px;
  background: #f9f8f4;
  font-family: Georgia, serif;
  position: relative; overflow: hidden;
}
.corner { position: absolute; width: 18px; height: 18px; border: 1px solid #ccc; }
.tl { top: 2rem; left: 2rem; border-right: none; border-bottom: none; }
.tr { top: 2rem; right: 2rem; border-left: none; border-bottom: none; }
.bl { bottom: 2rem; left: 2rem; border-right: none; border-top: none; }
.br { bottom: 2rem; right: 2rem; border-left: none; border-top: none; }
.content {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; width: 800px;
}
.label {
  font-size: 0.75rem; font-variant: small-caps;
  letter-spacing: 0.2em; color: #aaa; margin-bottom: 1.8rem;
}
.title {
  font-size: 3.8rem; font-weight: 700;
  color: #222; line-height: 1.15; margin-bottom: 1.5rem;
}
.rule { width: 3rem; height: 1px; background: #ccc; margin: 0 auto 1.5rem; }
.standfirst {
  font-style: italic; font-size: 1.25rem;
  color: #888; line-height: 1.6;
}
.byline {
  position: absolute; bottom: 2.5rem; right: 3rem;
  font-size: 0.7rem; font-variant: small-caps;
  letter-spacing: 0.15em; color: #bbb;
}
</style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="content">
    <div class="label">Narrative</div>
    <div class="title">A walk to the heavens</div>
    <div class="rule"></div>
    <div class="standfirst">Six started the ascent, carrying the weights of their past.<br>Only one survived.</div>
  </div>
  <div class="byline">Chindu Sreedharan</div>
</body>
</html>
